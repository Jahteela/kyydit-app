<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505"><meta name="robots" content="noindex,nofollow"><title>Kangaslammin Auto – Kyytikalenteri</title>
  <link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon.svg"><link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="authView" class="auth-view hidden">
    <section class="auth-card">
      <img src="brand-logo.png" alt="Kangaslammin Auto" class="auth-logo brand-logo"><h1>Kyytikalenteri</h1><p>Kangaslammin Auto</p>
      <form id="authForm"><label>Sähköposti<input id="email" type="email" autocomplete="email" required></label><label>Salasana<input id="password" type="password" minlength="6" autocomplete="current-password" required></label><button class="primary" type="submit">Kirjaudu</button></form>
      <p>Ylläpitäjä luo käyttäjätunnukset.</p><div id="authMessage" class="message"></div>
    </section>
  </div>
  <main id="appView" class="app hidden">
    <header><div class="brand"><img src="brand-logo.png" alt="Kangaslammin Auto" class="logo brand-logo"><div><h1>Kyytikalenteri</h1><div class="subtitle">Kangaslammin Auto <span id="modeBadge" class="badge demo">ESITTELY</span></div></div></div><div class="header-actions"><button id="todayBtn" class="secondary">Tänään</button><button id="exportBtn" class="secondary">Vie CSV</button><button id="logoutBtn" class="secondary hidden">Kirjaudu ulos</button></div></header>
    <div id="notice" class="notice hidden"></div>
    <section class="summary" aria-label="Päivän yhteenveto">
      <div class="summary-card"><span class="summary-icon">T</span><div><strong id="todayCount">0</strong><small>Kyytiä tänään</small></div></div>
      <div class="summary-card waiting"><span class="summary-icon">H</span><div><strong id="tomorrowCount">0</strong><small>Kyytiä huomenna</small></div></div>
      <div class="summary-card confirmed"><span class="summary-icon">7</span><div><strong id="weekCount">0</strong><small>Seuraavat 7 päivää</small></div></div>
    </section>
    <div class="layout">
      <section class="panel calendar-panel"><div class="cal-head"><h2 id="monthTitle"></h2><div><button id="prev" class="icon-btn" aria-label="Edellinen kuukausi">‹</button><button id="next" class="icon-btn" aria-label="Seuraava kuukausi">›</button></div></div><div class="weekdays"><span>ma</span><span>ti</span><span>ke</span><span>to</span><span>pe</span><span>la</span><span>su</span></div><div id="calendar" class="calendar"></div></section>
      <aside class="side">
        <section id="formPanel" class="panel form-panel"><h3 id="formTitle">Uusi taksitilaus</h3><form id="rideForm"><input id="rideId" type="hidden"><div class="fields">
          <label>Päivä<input id="date" type="date" required></label><label>Kellonaika<input id="time" type="time" required></label>
          <label class="full">Asiakas<input id="customer" required placeholder="Nimi"></label><label class="full">Puhelinnumero<input id="phone" type="tel" placeholder="040 123 4567"></label>
          <label class="full">Noutopaikka<input id="pickup" required placeholder="Osoite tai paikka"></label><label class="full">Määränpää<input id="destination" required placeholder="Osoite tai paikka"></label>
          <label class="full">Lisätiedot<textarea id="notes" placeholder="Esim. 2 matkustajaa, pyörätuoli…"></textarea></label>
        </div><div class="form-actions"><button class="primary" type="submit">Tallenna</button><button id="cancelEdit" class="secondary hidden" type="button">Peruuta</button></div></form></section>
        <section class="panel list-panel"><div class="list-head"><h3 id="selectedTitle">Päivän kyydit</h3><span id="count" class="count">0</span></div><div id="rides" class="rides"></div></section>
      </aside>
    </div>
  </main>
  <div id="toast" class="toast"></div>
  <script src="config.js"></script><script type="module" src="app.js"></script>
</body></html>
